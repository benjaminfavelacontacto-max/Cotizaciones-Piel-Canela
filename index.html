<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Dashboard | Premium Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Colores Apple Dark con tus acentos originales */
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --primary-text: #FFFFFF;
            --secondary-text: #8E8E93;
            --accent-blue: #0A84FF; /* Color Apple */
            --separator: #3A3A3C;
            --radius-main: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-main);
            border: 1px solid var(--separator);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--separator);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { font-size: 24px; margin: 0; letter-spacing: -0.5px; }

        /* Botón de exportar PDF sutil */
        .btn-pdf {
            background: #323236;
            color: white;
            border: 1px solid var(--separator);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .upload-area {
            text-align: center;
            padding: 20px;
            background-color: var(--input-bg);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px dashed var(--separator);
        }

        input[type="file"]::file-selector-button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .chart-container {
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--separator);
            height: 450px; /* Ajuste para que quepa en una hoja */
        }

        /* --- CORRECCIÓN PARA PDF (IMPRESIÓN) --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* Eliminamos márgenes de página */
            }
            body {
                background: white !important;
                padding: 0;
                margin: 0;
            }
            .app-container {
                width: 100%;
                max-width: 100%;
                border: none;
                box-shadow: none;
                background: white !important;
                color: black !important;
                padding: 40px; /* Margen interno para el PDF */
            }
            .upload-area, .btn-pdf, header::after {
                display: none !important; /* Ocultamos lo innecesario en el PDF */
            }
            h1 { color: black !important; margin-bottom: 30px; }
            .chart-container {
                background: white !important;
                border: 1px solid #eee;
                height: 500px !important; /* Forzamos tamaño en PDF */
            }
            /* Invertimos colores de la gráfica para que se vea bien en papel */
            canvas {
                filter: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="report">
        <header>
            <h1>Dashboard de Reportes</h1>
            <button class="btn-pdf" onclick="window.print()">Descargar PDF</button>
        </header>

        <div class="upload-area">
            <input type="file" id="upload" accept=".xlsx, .xls">
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                renderChart(jsonData);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function renderChart(data) {
            const labels = data.map(row => Object.values(row)[0]);
            const values = data.map(row => Object.values(row)[1]);

            const ctx = document.getElementById('myChart').getContext('2d');
            if (window.chartInstance) { window.chartInstance.destroy(); }
            
            window.chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Métrica Principal',
                        data: values,
                        backgroundColor: '#0A84FF', // Tu azul original/preferido
                        borderRadius: 5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#3A3A3C' }, ticks: { color: '#8E8E93' } },
                        x: { ticks: { color: '#8E8E93' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#FFFFFF' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
